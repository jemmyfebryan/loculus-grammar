<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grammar Check{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #242424;
            border: 1px solid #333;
            padding: 40px;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 500;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #b0b0b0;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #0066cc;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #0052a3;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .result {
            margin-top: 32px;
            padding: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
        }

        .result h2 {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 500;
        }

        .result p {
            color: #b0b0b0;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

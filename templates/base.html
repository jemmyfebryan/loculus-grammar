<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grammar Check{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: scroll;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #242424;
            border: 1px solid #333;
            padding: 40px;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 500;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label {
            color: #b0b0b0;
            font-weight: 500;
            font-size: 14px;
        }

        .context-toggle {
            color: #0066cc;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .context-toggle:hover {
            text-decoration: underline;
        }

        .context-group {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin-bottom 0.3s ease-out;
        }

        .context-group.visible {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 24px;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .advanced-toggle {
            color: #0066cc;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .advanced-toggle:hover {
            text-decoration: underline;
        }

        .advanced-group {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.3s ease-out, margin-bottom 0.3s ease-out;
        }

        .advanced-group.visible {
            max-height: 1000px;
            opacity: 1;
            margin-bottom: 24px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .checkbox-group:last-child {
            margin-bottom: 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #444;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #0066cc;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #0066cc;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 14px;
        }

        .advanced-options-label {
            color: #b0b0b0;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            color: #b0b0b0;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #0066cc;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #0052a3;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .result {
            margin-top: 32px;
        }

        .result-content {
            padding: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
        }

        .result h2 {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 500;
        }

        .result p {
            color: #b0b0b0;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-header h2 {
            margin-bottom: 0;
        }

        .result-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-button {
            background: #333;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 8px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-button:hover {
            background: #444;
        }

        .icon-button svg {
            width: 16px;
            height: 16px;
        }

        .copy-button {
            background: #333;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 6px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .copy-button:hover {
            background: #444;
        }

        .copy-button.copied {
            background: #2d5a2d;
            border-color: #3d7a3d;
        }

        .copy-button svg {
            width: 16px;
            height: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #242424;
            border: 1px solid #333;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            color: #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: #e0e0e0;
        }

        .modal textarea {
            min-height: 100px;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
        }

        .context-textarea-group {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin-top 0.3s ease-out;
        }

        .context-textarea-group.visible {
            max-height: 500px;
            opacity: 1;
            margin-top: 12px;
        }

        .navbar {
            background: #242424;
            border: 1px solid #333;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .navbar-nav {
            display: flex;
            gap: 20px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .navbar-nav li a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .navbar-nav li a:hover {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        .navbar-nav li a.active {
            background: #0066cc;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if authenticated %}
        <nav class="navbar">
            <ul class="navbar-nav">
                <li><a href="{{ ROOT_PATH }}/grammar" {% if page == 'grammar' %}class="active"{% endif %}>Grammar Check</a></li>
                <li><a href="{{ ROOT_PATH }}/library" {% if page == 'library' %}class="active"{% endif %}>Library</a></li>
                <li><a href="{{ ROOT_PATH }}/profile" {% if page == 'profile' %}class="active"{% endif %}>Profile</a></li>
            </ul>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>

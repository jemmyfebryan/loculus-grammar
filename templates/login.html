<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loculus AI Grammar</title>
    <link rel="stylesheet" href="{{ ROOT_PATH }}/static/css/main.css">
    <link rel="stylesheet" href="{{ ROOT_PATH }}/static/css/grid.css">
    <link rel="stylesheet" href="{{ ROOT_PATH }}/static/css/login.css">
</head>
<body>
    <div class="container">
        <div class="welcome">
            <h1>Welcome</h1>
            <p class="welcome-text">Loculus AI Grammar - Grid Authentication</p>
        </div>

        <div id="message-container"></div>

        <div class="grid-container">
            <div class="grid-label">Click the grid cells in your pattern sequence:</div>
            <div class="grid" id="auth-grid"></div>
            <button type="button" class="clear-btn" id="clear-btn">Clear Pattern</button>
            <p class="hint">Click at least 5 cells to create your authentication pattern.</p>
        </div>

        <button type="button" id="login-btn" disabled>Login</button>
    </div>

    <script src="{{ ROOT_PATH }}/static/js/login.js"></script>
    <script>
        window.ROOT_PATH = {{ '"' + ROOT_PATH + '"' if ROOT_PATH else '""' }};
    </script>
</body>
</html>

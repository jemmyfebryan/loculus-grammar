<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loculus AI Grammar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: scroll;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: #242424;
            border: 1px solid #333;
            padding: 40px;
        }

        h1 {
            color: #e0e0e0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 500;
        }

        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b0b0b0;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #0052a3;
        }

        .error {
            background: #3a1a1a;
            border: 1px solid #6b2020;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .welcome {
            text-align: center;
        }

        .welcome-text {
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome">
            <h1>Welcome</h1>
            <p class="welcome-text">Loculus AI Grammar - AI-powered grammar correction</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>

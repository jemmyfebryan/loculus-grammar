{% extends "base.html" %}

{% block title %}Loculus AI Grammar{% endblock %}

{% block content %}
    <h1>Loculus AI Grammar</h1>
    <p class="subtitle">AI-powered grammar correction</p>

    <form id="grammarForm">
        <div class="form-group">
            <div class="form-header">
                <label class="label" for="text">Enter your text:</label>
            </div>
            <textarea
                id="text"
                name="text"
                placeholder="Type or paste your text here to check grammar..."
                required></textarea>
            <div class="form-footer">
                <span></span>
                <span class="advanced-toggle" id="advancedToggle">Advanced options</span>
            </div>
        </div>

        <div class="advanced-group" id="advancedGroup">
            <div class="advanced-options-label">Advanced options</div>
            <div class="checkbox-group">
                <input type="checkbox" id="addContext" name="addContext" title="Provide additional context about your text to improve grammar accuracy">
                <label for="addContext" title="Provide additional context about your text to improve grammar accuracy">Add Context</label>
            </div>
            <div id="contextTextareaGroup" class="context-textarea-group">
                <textarea
                    id="context"
                    name="context"
                    placeholder="Add context about your text to improve grammar correction..."
                    style="min-height: 80px;"></textarea>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="addLibrary" name="addLibrary" title="Use texts from your library as examples for better grammar correction">
                <label for="addLibrary" title="Use texts from your library as examples for better grammar correction">Add Library</label>
            </div>
            <div id="librarySelectGroup" class="library-select-group">
                <select id="librarySelect" name="librarySelect" style="width: 100%; padding: 12px; border: 1px solid #444; background: #1a1a1a; color: #e0e0e0; font-size: 15px; font-family: inherit; cursor: pointer;">
                    <option value="">Select a library...</option>
                </select>
                <div style="color: #888; font-size: 12px; margin-top: 6px;">Top 3 most similar texts will be used as examples</div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="keepWritingStyle" name="keepWritingStyle" title="Maintain your original writing style, tone, and voice while fixing errors">
                <label for="keepWritingStyle" title="Maintain your original writing style, tone, and voice while fixing errors">Keep the writing style</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="preserveFormatting" name="preserveFormatting" title="Preserve line breaks, paragraph structure, and spacing in your text">
                <label for="preserveFormatting" title="Preserve line breaks, paragraph structure, and spacing in your text">Preserve formatting</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showExplanations" name="showExplanations" title="Display explanations for the grammar corrections made">
                <label for="showExplanations" title="Display explanations for the grammar corrections made">Show Explanations</label>
            </div>
            <div class="checkbox-group" style="align-items: center;">
                <input type="checkbox" id="multipleOutputs" name="multipleOutputs" title="Generate multiple alternative corrected versions of your text">
                <label for="multipleOutputs" title="Generate multiple alternative corrected versions of your text">Multiple Outputs:</label>
                <input
                    type="range"
                    id="outputCount"
                    name="outputCount"
                    min="1"
                    max="5"
                    value="1"
                    style="width: 60px; margin-left: 8px; display: none;">
                <span id="outputCountValue" style="color: #888; font-size: 13px; margin-left: 6px; display: none;">1</span>
            </div>
        </div>

        <button type="submit">Check Grammar</button>
    </form>

    <div id="result" class="result" style="display: none;">
        <div class="result-header">
            <h2>Corrected Text:</h2>
            <div class="result-buttons">
                <button class="icon-button" id="tryAgainBtn" title="Try again">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <button class="icon-button" id="tryAgainWithQuoteBtn" title="Try again with Instructions">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </button>
            </div>
        </div>
        <div id="correctedText" class="result-content" style="display: none;"></div>
    </div>

    <div id="quoteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Try Again with Instructions</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <textarea id="quoteInput" placeholder="Enter additional instructions for grammar correction..."></textarea>
            <div class="modal-buttons">
                <button type="button" id="modalCancel">Cancel</button>
                <button type="button" id="modalSubmit">Apply & Regenerate</button>
            </div>
        </div>
    </div>

    <style>
        .library-select-group {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin-bottom 0.3s ease-out;
        }

        .library-select-group.visible {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 12px;
        }

        select:focus {
            outline: none;
            border-color: #0066cc;
        }
    </style>

    <script>
        const form = document.getElementById('grammarForm');
        const resultDiv = document.getElementById('result');
        const correctedText = document.getElementById('correctedText');
        const textarea = document.getElementById('text');
        const addContextCheckbox = document.getElementById('addContext');
        const contextTextareaGroup = document.getElementById('contextTextareaGroup');
        const contextTextarea = document.getElementById('context');
        const advancedToggle = document.getElementById('advancedToggle');
        const advancedGroup = document.getElementById('advancedGroup');
        const keepWritingStyleCheckbox = document.getElementById('keepWritingStyle');
        const preserveFormattingCheckbox = document.getElementById('preserveFormatting');
        const showExplanationsCheckbox = document.getElementById('showExplanations');
        const multipleOutputsCheckbox = document.getElementById('multipleOutputs');
        const outputCountSlider = document.getElementById('outputCount');
        const outputCountValue = document.getElementById('outputCountValue');
        const tryAgainBtn = document.getElementById('tryAgainBtn');
        const tryAgainWithQuoteBtn = document.getElementById('tryAgainWithQuoteBtn');
        const quoteModal = document.getElementById('quoteModal');
        const modalClose = document.getElementById('modalClose');
        const modalCancel = document.getElementById('modalCancel');
        const modalSubmit = document.getElementById('modalSubmit');
        const quoteInput = document.getElementById('quoteInput');
        const addLibraryCheckbox = document.getElementById('addLibrary');
        const librarySelectGroup = document.getElementById('librarySelectGroup');
        const librarySelect = document.getElementById('librarySelect');

        let advancedVisible = false;
        let lastRequestData = null;

        // Load libraries on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadLibraries();
        });

        async function loadLibraries() {
            try {
                const response = await fetch('api/libraries');
                if (!response.ok) return;

                const data = await response.json();
                const libraries = data.libraries || [];

                // Clear existing options except the default one
                librarySelect.innerHTML = '<option value="">Select a library...</option>';

                // Add library options
                libraries.forEach(lib => {
                    const option = document.createElement('option');
                    option.value = lib.id;
                    option.textContent = lib.name;
                    librarySelect.appendChild(option);
                });
            } catch (error) {
                console.error('Failed to load libraries:', error);
            }
        }

        addLibraryCheckbox.addEventListener('change', () => {
            if (addLibraryCheckbox.checked) {
                librarySelectGroup.classList.add('visible');
            } else {
                librarySelectGroup.classList.remove('visible');
                librarySelect.value = '';
            }
        });

        addContextCheckbox.addEventListener('change', () => {
            if (addContextCheckbox.checked) {
                contextTextareaGroup.classList.add('visible');
            } else {
                contextTextareaGroup.classList.remove('visible');
            }
        });

        multipleOutputsCheckbox.addEventListener('change', () => {
            if (multipleOutputsCheckbox.checked) {
                outputCountSlider.style.display = 'inline-block';
                outputCountValue.style.display = 'inline';
                outputCountSlider.value = 2;
                outputCountValue.textContent = '2';
            } else {
                outputCountSlider.style.display = 'none';
                outputCountValue.style.display = 'none';
                outputCountSlider.value = 1;
                outputCountValue.textContent = '1';
            }
        });

        outputCountSlider.addEventListener('input', () => {
            outputCountValue.textContent = outputCountSlider.value;
        });

        advancedToggle.addEventListener('click', () => {
            advancedVisible = !advancedVisible;
            if (advancedVisible) {
                advancedGroup.classList.add('visible');
                advancedToggle.textContent = '- Hide options';
            } else {
                advancedGroup.classList.remove('visible');
                advancedToggle.textContent = 'Advanced options';
            }
        });

        async function checkGrammar(customInstructions = null) {
            const text = textarea.value.trim();
            if (!text) return;

            const context = contextTextarea.value.trim();
            const libraryId = addLibraryCheckbox.checked ? librarySelect.value : null;
            const keepWritingStyle = keepWritingStyleCheckbox.checked;
            const preserveFormatting = preserveFormattingCheckbox.checked;
            const showExplanations = showExplanationsCheckbox.checked;
            const multipleOutputs = multipleOutputsCheckbox.checked ? parseInt(outputCountSlider.value) : 1;

            const requestData = {
                text,
                context,
                library_id: libraryId,
                keep_writing_style: keepWritingStyle,
                preserve_formatting: preserveFormatting,
                show_explanations: showExplanations,
                multiple_outputs: multipleOutputs
            };
            if (customInstructions) {
                requestData.custom_instructions = customInstructions;
            }

            lastRequestData = requestData;

            // Show loading state
            const button = form.querySelector('button');
            const originalButtonText = button.textContent;
            button.textContent = 'Checking...';
            button.disabled = true;

            // Disable result buttons
            tryAgainBtn.disabled = true;
            tryAgainWithQuoteBtn.disabled = true;

            try {
                const response = await fetch('api/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData),
                });

                if (!response.ok) {
                    throw new Error('Failed to check grammar');
                }

                const data = await response.json();

                // Update result
                if (multipleOutputs > 1 && data.outputs) {
                    // Display multiple outputs
                    let outputHTML = '';
                    data.outputs.forEach((output, index) => {
                        const outputId = `output-${index}`;
                        outputHTML += `<div style="margin-bottom: ${index < data.outputs.length - 1 ? '20px' : '0'}; padding: 16px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; position: relative;" class="result-content">`;
                        outputHTML += `<div style="margin-bottom: 12px;">`;
                        outputHTML += `<div style="color: #0066cc; font-size: 14px; font-weight: 500; white-space: nowrap;">Option ${index + 1}</div>`;
                        if (output.explanation) {
                            outputHTML += `<div style="color: #b0b0b0; font-size: 13px; line-height: 1.4; margin-top: 4px;">${output.explanation}</div>`;
                        }
                        outputHTML += `</div>`;
                        outputHTML += `<p style="white-space: pre-wrap; margin: 0; color: #e0e0e0;" id="${outputId}">${output.text}</p>`;
                        outputHTML += `<button class="copy-button" onclick="copyToClipboard('${outputId}')" data-output-id="${outputId}" style="position: absolute; bottom: 16px; right: 16px;" title="Copy">`;
                        outputHTML += `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>`;
                        outputHTML += `</button>`;
                        outputHTML += `</div>`;
                    });
                    correctedText.innerHTML = outputHTML;
                    correctedText.style.display = 'block';
                } else if (showExplanations && data.explanation) {
                    correctedText.innerHTML = `
                        <div style="padding: 16px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; position: relative;" class="result-content">
                            <div style="color: #0066cc; font-size: 14px; font-weight: 500; margin-bottom: 8px; white-space: nowrap;">Explanation</div>
                            <div style="color: #b0b0b0; font-size: 13px; margin-bottom: 16px; line-height: 1.5;">${data.explanation}</div>
                            <div style="color: #0066cc; font-size: 14px; font-weight: 500; margin-bottom: 8px; white-space: nowrap;">Corrected Text</div>
                            <p style="white-space: pre-wrap; margin: 0; color: #e0e0e0;" id="single-output">${data.corrected}</p>
                            <button class="copy-button" onclick="copyToClipboard('single-output')" style="position: absolute; bottom: 16px; right: 16px;" title="Copy">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                    `;
                    correctedText.style.display = 'block';
                } else if (data.corrected) {
                    correctedText.innerHTML = `
                        <div style="padding: 16px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; position: relative;" class="result-content">
                            <p style="white-space: pre-wrap; margin: 0; color: #e0e0e0;" id="single-output">${data.corrected}</p>
                            <button class="copy-button" onclick="copyToClipboard('single-output')" style="position: absolute; bottom: 16px; right: 16px;" title="Copy">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                    `;
                    correctedText.style.display = 'block';
                } else {
                    correctedText.innerHTML = `
                        <div style="padding: 16px; background: #2a2a2a; border-radius: 8px; border: 1px solid #333; position: relative;" class="result-content">
                            <p style="white-space: pre-wrap; margin: 0; color: #e0e0e0;" id="single-output">${result}</p>
                            <button class="copy-button" onclick="copyToClipboard('single-output')" style="position: absolute; bottom: 16px; right: 16px;" title="Copy">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                    `;
                    correctedText.style.display = 'block';
                }
                resultDiv.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                correctedText.textContent = 'Error checking grammar. Please try again.';
                resultDiv.style.display = 'block';
            } finally {
                button.textContent = originalButtonText;
                button.disabled = false;
                tryAgainBtn.disabled = false;
                tryAgainWithQuoteBtn.disabled = false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await checkGrammar();
        });

        tryAgainBtn.addEventListener('click', async () => {
            await checkGrammar();
        });

        tryAgainWithQuoteBtn.addEventListener('click', () => {
            quoteModal.classList.add('active');
            quoteInput.focus();
        });

        modalClose.addEventListener('click', () => {
            quoteModal.classList.remove('active');
        });

        modalCancel.addEventListener('click', () => {
            quoteModal.classList.remove('active');
        });

        modalSubmit.addEventListener('click', async () => {
            const customInstructions = quoteInput.value.trim();
            quoteModal.classList.remove('active');
            quoteInput.value = '';
            await checkGrammar(customInstructions);
        });

        quoteModal.addEventListener('click', (e) => {
            if (e.target === quoteModal) {
                quoteModal.classList.remove('active');
            }
        });

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent || element.innerText;

            navigator.clipboard.writeText(text).then(() => {
                const button = document.querySelector(`[data-output-id="${elementId}"]`) || document.querySelector('.copy-button');
                button.classList.add('copied');
                button.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                `;

                setTimeout(() => {
                    button.classList.remove('copied');
                    button.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                    `;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
    </script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Grammar Check - AI Powered{% endblock %}

{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
        <div>
            <h1>Grammar Check</h1>
            <p class="subtitle">AI-powered grammar correction powered by Google Gemini</p>
        </div>
        <div style="text-align: right;">
            <p style="color: #888; font-size: 13px; margin-bottom: 4px;">{{ username }}</p>
            <a href="/logout" style="color: #0066cc; font-size: 13px; text-decoration: none;">Logout</a>
        </div>
    </div>

    <form id="grammarForm">
        <div class="form-group">
            <div class="form-header">
                <label class="label" for="text">Enter your text:</label>
            </div>
            <textarea
                id="text"
                name="text"
                placeholder="Type or paste your text here to check grammar..."
                required></textarea>
            <div class="form-footer">
                <span></span>
                <span class="advanced-toggle" id="advancedToggle">Advanced options</span>
            </div>
        </div>

        <div class="advanced-group" id="advancedGroup">
            <div class="advanced-options-label">Advanced options</div>
            <div class="checkbox-group">
                <input type="checkbox" id="addContext" name="addContext">
                <label for="addContext">Add Context</label>
            </div>
            <div id="contextTextareaGroup" class="context-textarea-group">
                <textarea
                    id="context"
                    name="context"
                    placeholder="Add context about your text to improve grammar correction..."
                    style="min-height: 80px;"></textarea>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="keepWritingStyle" name="keepWritingStyle">
                <label for="keepWritingStyle">Keep the writing style</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="showExplanations" name="showExplanations">
                <label for="showExplanations">Show Explanations</label>
            </div>
            <div class="checkbox-group" style="align-items: center;">
                <input type="checkbox" id="multipleOutputs" name="multipleOutputs">
                <label for="multipleOutputs">Multiple Outputs:</label>
                <input
                    type="range"
                    id="outputCount"
                    name="outputCount"
                    min="1"
                    max="5"
                    value="1"
                    style="width: 60px; margin-left: 8px; display: none;">
                <span id="outputCountValue" style="color: #888; font-size: 13px; margin-left: 6px; display: none;">1</span>
            </div>
        </div>

        <button type="submit">Check Grammar</button>
    </form>

    <div id="result" class="result" style="display: none;">
        <div class="result-header">
            <h2>Corrected Text:</h2>
            <div class="result-buttons">
                <button class="icon-button" id="tryAgainBtn" title="Try again">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <button class="icon-button" id="tryAgainWithQuoteBtn" title="Try again with Instructions">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                    </svg>
                </button>
            </div>
        </div>
        <p id="correctedText"></p>
    </div>

    <div id="quoteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Try Again with Instructions</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <textarea id="quoteInput" placeholder="Enter additional instructions for grammar correction..."></textarea>
            <div class="modal-buttons">
                <button type="button" id="modalCancel">Cancel</button>
                <button type="button" id="modalSubmit">Apply & Regenerate</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('grammarForm');
        const resultDiv = document.getElementById('result');
        const correctedText = document.getElementById('correctedText');
        const textarea = document.getElementById('text');
        const addContextCheckbox = document.getElementById('addContext');
        const contextTextareaGroup = document.getElementById('contextTextareaGroup');
        const contextTextarea = document.getElementById('context');
        const advancedToggle = document.getElementById('advancedToggle');
        const advancedGroup = document.getElementById('advancedGroup');
        const keepWritingStyleCheckbox = document.getElementById('keepWritingStyle');
        const showExplanationsCheckbox = document.getElementById('showExplanations');
        const multipleOutputsCheckbox = document.getElementById('multipleOutputs');
        const outputCountSlider = document.getElementById('outputCount');
        const outputCountValue = document.getElementById('outputCountValue');
        const tryAgainBtn = document.getElementById('tryAgainBtn');
        const tryAgainWithQuoteBtn = document.getElementById('tryAgainWithQuoteBtn');
        const quoteModal = document.getElementById('quoteModal');
        const modalClose = document.getElementById('modalClose');
        const modalCancel = document.getElementById('modalCancel');
        const modalSubmit = document.getElementById('modalSubmit');
        const quoteInput = document.getElementById('quoteInput');

        let advancedVisible = false;
        let lastRequestData = null;

        addContextCheckbox.addEventListener('change', () => {
            if (addContextCheckbox.checked) {
                contextTextareaGroup.classList.add('visible');
            } else {
                contextTextareaGroup.classList.remove('visible');
            }
        });

        multipleOutputsCheckbox.addEventListener('change', () => {
            if (multipleOutputsCheckbox.checked) {
                outputCountSlider.style.display = 'inline-block';
                outputCountValue.style.display = 'inline';
                outputCountSlider.value = 2;
                outputCountValue.textContent = '2';
            } else {
                outputCountSlider.style.display = 'none';
                outputCountValue.style.display = 'none';
                outputCountSlider.value = 1;
                outputCountValue.textContent = '1';
            }
        });

        outputCountSlider.addEventListener('input', () => {
            outputCountValue.textContent = outputCountSlider.value;
        });

        advancedToggle.addEventListener('click', () => {
            advancedVisible = !advancedVisible;
            if (advancedVisible) {
                advancedGroup.classList.add('visible');
                advancedToggle.textContent = '- Hide options';
            } else {
                advancedGroup.classList.remove('visible');
                advancedToggle.textContent = 'Advanced options';
            }
        });

        async function checkGrammar(customInstructions = null) {
            const text = textarea.value.trim();
            if (!text) return;

            const context = contextTextarea.value.trim();
            const keepWritingStyle = keepWritingStyleCheckbox.checked;
            const showExplanations = showExplanationsCheckbox.checked;
            const multipleOutputs = multipleOutputsCheckbox.checked ? parseInt(outputCountSlider.value) : 1;

            const requestData = {
                text,
                context,
                keep_writing_style: keepWritingStyle,
                show_explanations: showExplanations,
                multiple_outputs: multipleOutputs
            };
            if (customInstructions) {
                requestData.custom_instructions = customInstructions;
            }

            lastRequestData = requestData;

            // Show loading state
            const button = form.querySelector('button');
            const originalButtonText = button.textContent;
            button.textContent = 'Checking...';
            button.disabled = true;

            // Disable result buttons
            tryAgainBtn.disabled = true;
            tryAgainWithQuoteBtn.disabled = true;

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData),
                });

                if (!response.ok) {
                    throw new Error('Failed to check grammar');
                }

                const data = await response.json();

                // Update result
                if (multipleOutputs > 1 && data.outputs) {
                    // Display multiple outputs
                    let outputHTML = '';
                    data.outputs.forEach((output, index) => {
                        outputHTML += `<div style="margin-bottom: ${index < data.outputs.length - 1 ? '16px' : '0'};">`;
                        outputHTML += `<div style="color: #888; font-size: 12px; margin-bottom: 4px;">Option ${index + 1}${output.explanation ? ': ' + output.explanation : ''}</div>`;
                        outputHTML += `<p style="white-space: pre-wrap;">${output.text}</p>`;
                        outputHTML += `</div>`;
                    });
                    correctedText.innerHTML = outputHTML;
                } else if (showExplanations && data.explanation) {
                    correctedText.innerHTML = `<div style="color: #888; font-size: 12px; margin-bottom: 8px;">${data.explanation}</div><p style="white-space: pre-wrap;">${data.corrected}</p>`;
                } else {
                    correctedText.textContent = data.corrected;
                }
                resultDiv.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                correctedText.textContent = 'Error checking grammar. Please try again.';
                resultDiv.style.display = 'block';
            } finally {
                button.textContent = originalButtonText;
                button.disabled = false;
                tryAgainBtn.disabled = false;
                tryAgainWithQuoteBtn.disabled = false;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await checkGrammar();
        });

        tryAgainBtn.addEventListener('click', async () => {
            await checkGrammar();
        });

        tryAgainWithQuoteBtn.addEventListener('click', () => {
            quoteModal.classList.add('active');
            quoteInput.focus();
        });

        modalClose.addEventListener('click', () => {
            quoteModal.classList.remove('active');
        });

        modalCancel.addEventListener('click', () => {
            quoteModal.classList.remove('active');
        });

        modalSubmit.addEventListener('click', async () => {
            const customInstructions = quoteInput.value.trim();
            quoteModal.classList.remove('active');
            quoteInput.value = '';
            await checkGrammar(customInstructions);
        });

        quoteModal.addEventListener('click', (e) => {
            if (e.target === quoteModal) {
                quoteModal.classList.remove('active');
            }
        });
    </script>
{% endblock %}
